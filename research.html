<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — Anthony Réveillac</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --charcoal: #2C2C2A;
      --coral: #D85A30;
      --coral-dk: #993C1D;
      --coral-lt: #FAECE7;
      --light-bg: #F7F6F2;
      --white: #FFFFFF;
      --text: #3a3a38;
      --muted: #888780;
      --border: rgba(44,44,42,0.1);
      --serif: 'Lora', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--light-bg); color: var(--text); }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      height: 60px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 3rem; background: var(--charcoal); border-bottom: 2px solid var(--coral);
    }
    .nav-brand { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--white); text-decoration: none; }
    .nav-brand:hover { color: var(--coral-lt); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.2s;
      position: relative; padding-bottom: 3px;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 1.5px; background: var(--coral);
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    /* ── PAGE HEADER ── */
    .page-header {
      background: var(--light-bg); padding: 3.5rem 3rem 2.5rem;
      border-bottom: 1px solid var(--border); position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--coral);
    }
    .page-header-inner { max-width: 960px; margin: 0 auto; }
    .page-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--coral); margin-bottom: 0.5rem; }
    .page-title { font-family: var(--serif); font-size: 2.2rem; font-weight: 600; color: var(--charcoal); margin-bottom: 0.6rem; }
    .page-subtitle { font-size: 15px; color: var(--muted); max-width: 520px; line-height: 1.6; }
    .page-subtitle a { color: var(--coral); text-decoration: none; }

    /* ── MAIN ── */
    .main { max-width: 960px; margin: 0 auto; padding: 3rem; }

    /* ── STATS ── */
    .stats-bar { display: flex; gap: 1rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.4rem; text-align: center; flex: 1; min-width: 110px;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .stat-card.visible { opacity: 1; transform: translateY(0); }
    .stat-num { font-size: 1.8rem; font-weight: 600; color: var(--coral); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    /* ── CATEGORY ACCORDION ── */
    .categories { display: flex; flex-direction: column; gap: 1rem; }

    .category {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.2s;
    }
    .category.visible { opacity: 1; transform: translateY(0); }
    .category.open { border-color: rgba(216,90,48,0.3); }

    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.5rem; cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .cat-header:hover { background: rgba(216,90,48,0.03); }

    .cat-header-left { display: flex; align-items: center; gap: 1rem; }
    .cat-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .cat-name { font-family: var(--serif); font-size: 1.05rem; font-weight: 600; color: var(--charcoal); }
    .cat-count {
      font-size: 12px; font-weight: 500; color: var(--coral);
      background: var(--coral-lt); padding: 2px 8px; border-radius: 999px;
    }

    .cat-arrow {
      width: 20px; height: 20px; color: var(--muted);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    .category.open .cat-arrow { transform: rotate(180deg); }

    /* accordion body */
    .cat-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .cat-body-inner { padding: 0 1.5rem 1.2rem; border-top: 1px solid var(--border); }

    /* sub-filter inside category */
    .sub-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; padding: 0.9rem 0 0.8rem; }
    .sub-btn {
      padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .sub-btn:hover { border-color: var(--coral); color: var(--coral); }
    .sub-btn.active { background: var(--coral); border-color: var(--coral); color: var(--white); }

    /* pub cards */
    .pub-card {
      border-top: 1px solid var(--border); padding: 1rem 0;
      transition: background 0.15s;
    }
    .pub-card:first-of-type { border-top: none; }

    .pub-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 0.3rem; }
    .pub-badge {
      flex-shrink: 0; font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 4px; margin-top: 3px;
    }
    .badge-ART { background: #E6F1FB; color: #185FA5; }
    .badge-PRE { background: var(--coral-lt); color: var(--coral-dk); }
    .badge-COM { background: #EAF3DE; color: #3B6D11; }
    .badge-THE { background: #EEEDFE; color: #534AB7; }

    .pub-title { font-size: 14.5px; font-weight: 500; color: var(--charcoal); line-height: 1.4; flex: 1; }
    .pub-authors { font-size: 13px; color: var(--muted); margin-bottom: 0.2rem; }
    .pub-authors strong { color: var(--coral-dk); font-weight: 500; }
    .pub-venue { font-size: 13px; color: var(--text); font-style: italic; margin-bottom: 0.5rem; }
    .pub-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .pub-link {
      font-size: 12px; font-weight: 500; text-decoration: none;
      padding: 2px 9px; border-radius: 4px;
      border: 1px solid var(--border); color: var(--muted); transition: all 0.15s;
    }
    .pub-link:hover { border-color: var(--coral); color: var(--coral); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 4rem; color: var(--muted); }
    .loader {
      width: 32px; height: 32px; border: 2.5px solid var(--border);
      border-top-color: var(--coral); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer { background: var(--charcoal); text-align: center; padding: 1.6rem; font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 2rem; }
    footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
    footer a:hover { color: var(--coral); }

    @media (max-width: 700px) {
      nav { padding: 0 1.5rem; }
      .page-header { padding: 2.5rem 1.5rem 2rem; }
      .main { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">Anthony Réveillac</a>
    <ul class="nav-links">
      <li><a href="index.html">Welcome</a></li>
      <li><a href="research.html" class="active">Research</a></li>
      <li><a href="teaching.html">Teaching</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <div class="page-header-inner">
      <p class="page-eyebrow">Publications</p>
      <h1 class="page-title">Research</h1>
      <p class="page-subtitle">Publications retrieved live from <a href="https://cv.hal.science/anthony-reveillac" target="_blank">HAL open science</a> — always up to date.</p>
    </div>
  </header>

  <main class="main">
    <div id="tag-bar" style="display:none;margin-bottom:1.5rem;">
      <p style="font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--coral);margin-bottom:0.7rem;display:flex;align-items:center;gap:10px;">
        <span style="display:block;width:24px;height:1.5px;background:var(--coral);"></span>
        Filter by topic
      </p>
      <div id="tag-buttons" style="display:flex;flex-wrap:wrap;gap:0.4rem;"></div>
      <p id="pub-count" style="font-size:12px;color:var(--muted);margin-top:0.7rem;"></p>
    </div>
    <div id="pub-list">
      <div class="loading"><div class="loader"></div>Fetching publications from HAL…</div>
    </div>
  </main>

  <footer>
    <p>Anthony Réveillac &nbsp;·&nbsp; INSA Toulouse &nbsp;·&nbsp; <a href="mailto:anthony.reveillac@insa-toulouse.fr">anthony.reveillac@insa-toulouse.fr</a></p>
  </footer>

  <script>
    // ── CATEGORY DEFINITIONS ──────────────────────────────────────
    const CATEGORIES = [
      {
        id: 'insurance',
        name: 'Insurance Modelling & Hawkes Processes',
        icon: '⚡',
        color: '#993C1D',
        bg: '#FAECE7',
        keywords: ['hawkes','counting process','cyber','insurance','point process','compound','intensity','self-exciting','cluster','normal approximation','malliavin-stein','chaotic expansion','poisson imbedding','multivariate','khabou','hillairet'],
        halIds: ['hal-03189601','hal-04726261','hal-03189614','hal-04717442','hal-04058740','hal-04554378','hal-04663022','hal-05001701','hal-04997515','hal-05558990','hal-05628543']
      },
      {
        id: 'malliavin',
        name: 'Malliavin Calculus',
        icon: 'D',
        color: '#534AB7',
        bg: '#EEEDFE',
        keywords: ['malliavin','stein','wiener','normal approximation','chaos','clark-ocone','sobolev','divergence','ornstein','hermite','nourdin','peccati','shrinkage','stein estimation','poisson channel','likelihood ratio'],
        halIds: ['hal-00272442','hal-00918464','hal-00918459','hal-00918469','hal-00918523','hal-00918366','hal-04717442','hal-04554378','hal-03189614','hal-01101190']
      },
      {
        id: 'finance',
        name: 'Mathematical Finance & BSDEs',
        icon: '📈',
        color: '#185FA5',
        bg: '#E6F1FB',
        keywords: ['bsde','backward stochastic','utility maximization','risk measure','portfolio','finance','principal-agent','risk-sharing','forward-backward','quadratic bsde','bspde','martingale representation'],
        halIds: ['hal-00918512','hal-00631727','hal-00814702','hal-01126684','hal-01432980','hal-00971728','hal-00918424','hal-00918453','hal-01874707','hal-00863893','hal-00615501','hal-00508892','hal-01561987','hal-01101190']
      },
      {
        id: 'regularization',
        name: 'Regularization by Noise',
        icon: '〜',
        color: '#3B6D11',
        bg: '#EAF3DE',
        keywords: ['regularization','strichartz','hardy-littlewood','dispersion','fractional brownian','brownian sheet','stratonovich','quadratic variation','hurst','variations','weak','semimartingale','itô-tanaka','tanaka'],
        halIds: ['hal-01636293','hal-01178614','hal-02176741','hal-00493981','hal-00258524','hal-00976747','hal-00522801','hal-00918474','hal-00918480','hal-00635484']
      }
    ];

    const TYPE_MAP = {
      'ART':'ART','JOURNAL':'ART',
      'PREPRINT':'PRE','UNDEFINED':'PRE',
      'COMM':'COM','POSTER':'COM','LECTURE':'COM',
      'THESE':'THE','HDR':'THE'
    };
    const TYPE_LABEL = { ART:'Journal', PRE:'Preprint', COM:'Proceedings', THE:'Thesis' };

    let allPubs = [];

    // ── ASSIGN PUBLICATION TO TAGS (multi) ───────────────────────
    function assignTags(pub) {
      const text = (pub.title + ' ' + pub.authors.join(' ')).toLowerCase();
      const tags = new Set();
      // halId match
      for (const cat of CATEGORIES) {
        if (cat.halIds.some(id => pub.halId && pub.halId.startsWith(id))) {
          tags.add(cat.id);
        }
      }
      // keyword match — add category if at least one keyword matches
      for (const cat of CATEGORIES) {
        if (cat.keywords.some(kw => text.includes(kw))) {
          tags.add(cat.id);
        }
      }
      // ensure at least one tag
      if (tags.size === 0) tags.add('finance');
      return Array.from(tags);
    }

    // ── EXCLUDED PUBLICATIONS ─────────────────────────────────────
    // Match by title substring (case-insensitive, partial match ok)
    const EXCLUDE_TITLES = [
    ];

    function isExcluded(pub) {
      const t = pub.title.toLowerCase();
      return EXCLUDE_TITLES.some(ex => t.includes(ex));
    }

    // ── FETCH ─────────────────────────────────────────────────────
    async function fetchPubs() {
      try {
        const res = await fetch('https://api.archives-ouvertes.fr/search/?q=authIdHal_s:anthony-reveillac&rows=100&fl=title_s,authFullName_s,producedDate_s,journalTitle_s,docType_s,uri_s,halId_s,doiId_s,conferenceTitle_s,volume_s,issue_s,page_s,serieTitle_s&sort=producedDate_s+desc&wt=json');
        const data = await res.json();
        allPubs = data.response.docs.map(doc => ({
          title: Array.isArray(doc.title_s) ? doc.title_s[0] : (doc.title_s || 'Untitled'),
          authors: doc.authFullName_s || [],
          year: doc.producedDate_s ? doc.producedDate_s.substring(0,4) : '—',
          venue: doc.journalTitle_s || doc.conferenceTitle_s || doc.serieTitle_s || '',
          volume: doc.volume_s || '',
          issue: doc.issue_s || '',
          pages: doc.page_s || '',
          type: TYPE_MAP[doc.docType_s] || 'PRE',
          halId: doc.halId_s,
          uri: doc.uri_s,
          doi: doc.doiId_s
        })).filter(p => !isExcluded(p));
        allPubs.forEach(p => { p.tags = assignTags(p); });
        // Sort all pubs by year descending
        const yearOf = p => { const y = parseInt(p.year, 10); return isNaN(y) ? 0 : y; };
        allPubs.sort((a, b) => yearOf(b) - yearOf(a));
        renderTagBar();
        renderList();
        document.getElementById('tag-bar').style.display = 'block';
      } catch(e) {
        document.getElementById('pub-list').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted)">Could not load publications. <a href="https://cv.hal.science/anthony-reveillac" target="_blank" style="color:var(--coral)">View on HAL →</a></div>`;
      }
    }

    // ── TAG BAR ───────────────────────────────────────────────────
    const activeTags = new Set();

    function renderTagBar() {
      const wrap = document.getElementById('tag-buttons');
      wrap.innerHTML = '';
      CATEGORIES.forEach(cat => {
        const count = allPubs.filter(p => p.tags.includes(cat.id)).length;
        const btn = document.createElement('button');
        btn.dataset.tag = cat.id;
        btn.style.cssText = `border:1.5px solid ${cat.color}30;background:transparent;color:${cat.color};padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;`;
        btn.innerHTML = `${cat.name} <span style="opacity:0.55;font-size:11px;">${count}</span>`;
        btn.addEventListener('click', () => {
          if (activeTags.has(cat.id)) {
            activeTags.delete(cat.id);
            btn.style.background = 'transparent';
            btn.style.color = cat.color;
          } else {
            activeTags.add(cat.id);
            btn.style.background = cat.color;
            btn.style.color = 'white';
            btn.style.borderColor = cat.color;
          }
          renderList();
        });
        wrap.appendChild(btn);
      });
    }

    // ── RENDER FLAT LIST ─────────────────────────────────────────
    function renderList() {
      const container = document.getElementById('pub-list');
      const filtered = activeTags.size === 0
        ? allPubs
        : allPubs.filter(p => Array.from(activeTags).every(t => p.tags.includes(t)));
      document.getElementById('pub-count').textContent =
        `${filtered.length} publication${filtered.length > 1 ? 's' : ''}` +
        (activeTags.size > 0 ? ` matching all selected tags` : ` in total`);
      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);font-size:14px;">No publication matches the selected tags.</div>';
        return;
      }
      // Group by year
      const byYear = {};
      filtered.forEach(p => {
        if (!byYear[p.year]) byYear[p.year] = [];
        byYear[p.year].push(p);
      });
      const years = Object.keys(byYear).sort((a, b) => (parseInt(b)||0) - (parseInt(a)||0));
      container.innerHTML = years.map(y => `
        <div class="year-group">
          <span class="year-heading">${y}</span>
          ${byYear[y].map(p => renderPubCard(p)).join('')}
        </div>
      `).join('');
    }

    function renderPubCard(p) {
      const authorsHtml = p.authors.map(a => a.includes('Réveillac') ? `<strong>${a}</strong>` : a).join(', ');
      const tagsHtml = p.tags.map(t => {
        const cat = CATEGORIES.find(c => c.id === t);
        if (!cat) return '';
        return `<span style="display:inline-block;background:${cat.bg};color:${cat.color};font-size:10px;font-weight:600;letter-spacing:0.04em;padding:2px 8px;border-radius:999px;">${cat.name}</span>`;
      }).join(' ');

      // Build venue citation: Journal, vol. X (Y), pp. A–B
      const clean = v => {
        if (!v) return '';
        const s = String(v).trim();
        if (/^\(?none\)?$/i.test(s) || /^n\/?a$/i.test(s) || s === '-' || s === '—') return '';
        return s;
      };
      const vol = clean(p.volume);
      const iss = clean(p.issue);
      const pgs = clean(p.pages);
      let venueLine = '';
      if (p.venue) {
        venueLine = `<em>${p.venue}</em>`;
        if (vol) {
          venueLine += `, vol. ${vol}`;
          if (iss) venueLine += ` (${iss})`;
        } else if (iss) {
          venueLine += `, no. ${iss}`;
        }
        if (pgs) venueLine += `, pp. ${pgs}`;
      }

      return `
        <div class="pub-card">
          <div class="pub-top">
            <span class="pub-badge badge-${p.type}">${TYPE_LABEL[p.type]||p.type}</span>
            <span class="pub-title">${p.title} <span style="font-size:12px;color:var(--muted);font-weight:400">(${p.year})</span></span>
          </div>
          <p class="pub-authors">${authorsHtml}</p>
          ${venueLine ? `<p class="pub-venue">${venueLine}</p>` : ''}
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin:0.4rem 0;">${tagsHtml}</div>
          <div class="pub-links">
            <a class="pub-link" href="${p.uri}" target="_blank">HAL →</a>
            ${p.doi ? `<a class="pub-link" href="https://doi.org/${p.doi}" target="_blank">DOI →</a>` : ''}
          </div>
        </div>`;
    }

    const page = window.location.pathname.split('/').pop() || 'index.html';
    document.querySelectorAll('.nav-links a').forEach(a => a.classList.toggle('active', a.getAttribute('href') === page));

    fetchPubs();
  </script>
</body>
</html>
